<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dimensões e Unidades</title>

    <style>
      /* vh - viewport height altura*/
      /*vw - viewport width largura*/
      /* em  - Relativa ao tamanho da fonte (font-size). 1em = tamanho da fonte do elemento (ou do pai)*/
      /* rem */

      html {
        /* font-size: 10px; */
        font-size: 62.5%;
      }

      .box {
        background-color: red;
        padding: 10px;
        width: 10rem;
        height: 15rem;
        font-size: 16px;
      }

      section {
        font-size: 10px;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1em;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>Meu titulo</h1>
      <p>Meu paragrafo</p>
    </div>
    <section>
      <p>Meu segundo Parágrafo</p>
    </section>
  </body>
</html>
