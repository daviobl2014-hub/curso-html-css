<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tipos de Visualização</title>
  </head>
  <body>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 62.5%;
      }
      /* 
      block 
      ocupa todo espaço horizontal 
      quebra linhas
      box model se aplica
      padding e margn funcionam normalmente 
      */
      h1 {
        font-size: 3.2rem;
        height: 5rem;
        margin: 1rem;
        padding: 1rem;
      }
      h2 {
        font-size: 2.4rem;
      }
      p {
        display: block;
        font-size: 1.6rem;
      }
      /* 
      inline
      ocupa apenas o espaço do conteudo
      não quebra linhas
      box model nao se aplica 
      padding e margin so funcionam na horiontal
      */
      /* 
      inline-block
      ocupa apenas o espaço do conteudo
      não quebra linhas
      box model se aplica 
      padding e margin so funcionam normalmente
      */
      a {
        margin: 2rem;
        display: inline-block;
        font-size: 1.6rem;
        height: 5rem;
      }

      span {
        /* display: none; */
        font-style: italic;
        color: red;
      }
    </style>
    <div>
      <h1>Meu titulo</h1>
      <h1>Meu titulo</h1>
      <h2>Meu sub titulo</h2>
      <a href="">acesse meu site</a>
      <a href="">acesse meu site</a>
      <p>
        Lorem ipsum dolor sit amet <b>consectetur adipisicing elit.</b>Natus,
        quas ratione. Cupiditate totam nam ipsa sunt
        <span>culpa beatae aliquam quam</span> laborum velit quos iusto aut
        itaque, nemo qui, laboriosam libero.
      </p>
    </div>
  </body>
</html>
