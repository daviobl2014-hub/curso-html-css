<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo classe</title>
  </head>
  <body>
    <style>
      /* LVHA - Link , visited, hover, active */

      a:link,
      a:visited {
        color: blue;
        font-weight: 500;
        font-style: italic;
      }

      a:hover,
      a:active {
        color: red;
        font-weight: 700;
      }
    </style>

     <p>Meu Paragráfo</p>
    <a
      href="https://developer.mozilla.org/pt-BR/docs/Web/CSS/Reference/Selectors/Pseudo-classes"
      >Minha ancora</a
    >
  </body>
</html>
