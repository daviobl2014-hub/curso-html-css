<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas</title>
  </head>
  <body>
    <main>
      <section>
        <table>
          <!-- <caption>
            Legenda da tabela
          </caption> -->

          <colgroup>

              <th>Cabeçalho 3</th>

          <tbody>
            <tr>
              <th>informação 1</th>

            </tr>
            <tr>
              <th>informação 4</th>
              <td>informação 5</td>
              <td>informação 6</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <th>Rodapé 1</th>
              <td>Rodapé 2</td>
              <td>Rodapé 3</td>
            </tr>
          </tfoot>
        </table>

</html>
